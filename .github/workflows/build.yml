name: Build Linux Binary
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: sudo apt-get update && sudo apt-get install -y python3-tk
      - run: pip install pyinstaller customtkinter pdfplumber pandas matplotlib requests openpyxl pillow
      - run: pyinstaller --onefile --name "ResultAnalyzer" --hidden-import=pdfplumber --hidden-import=pdfminer --hidden-import=pdfminer.high_level --hidden-import=customtkinter --hidden-import=openpyxl --hidden-import=pandas --hidden-import=matplotlib --hidden-import=matplotlib.backends.backend_tkagg --hidden-import=requests --collect-all customtkinter --collect-all pdfplumber app.py
      - run: |
          mkdir -p pkg/DEBIAN pkg/usr/local/bin
          cp dist/ResultAnalyzer pkg/usr/local/bin/
          chmod +x pkg/usr/local/bin/ResultAnalyzer
          printf "Package: result-analyzer\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: Dev <dev@email.com>\nDescription: Result Analyzer\n" > pkg/DEBIAN/control
          dpkg-deb --build pkg result-analyzer_1.0.0.deb
      - uses: actions/upload-artifact@v3
        with:
          name: ResultAnalyzer-Linux
          path: |
            dist/ResultAnalyzer
            result-analyzer_1.0.0.deb
