name: Build Linux Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter pdfplumber pandas matplotlib requests openpyxl pillow

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name "ResultAnalyzer" \
            --hidden-import=pdfplumber \
            --hidden-import=pdfminer \
            --hidden-import=pdfminer.high_level \
            --hidden-import=pdfminer.layout \
            --hidden-import=pdfminer.converter \
            --hidden-import=pdfminer.pdfinterp \
            --hidden-import=pdfminer.pdfdevice \
            --hidden-import=customtkinter \
            --hidden-import=openpyxl \
            --hidden-import=openpyxl.styles \
            --hidden-import=pandas \
            --hidden-import=pandas.io.formats.excel \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.backends.backend_tkagg \
            --hidden-import=requests \
            --hidden-import=charset_normalizer \
            --hidden-import=PIL \
            --collect-all customtkinter \
            --collect-all pdfplumber \
            --collect-all pdfminer \
            app.py

      - name: Create .deb package with icon
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/local/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/share/icons/hicolor/128x128/apps
          mkdir -p pkg/usr/share/icons/hicolor/64x64/apps
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps
          mkdir -p pkg/usr/share/pixmaps

          cp dist/ResultAnalyzer pkg/usr/local/bin/ResultAnalyzer
          chmod +x pkg/usr/local/bin/ResultAnalyzer

          # Copy icon if exists in repo
          if [ -f "logo.png" ]; then
            cp logo.png pkg/usr/share/pixmaps/result-analyzer.png
            cp logo.png pkg/usr/share/icons/hicolor/256x256/apps/result-analyzer.png
            # Resize for other sizes using Python
            python3 -c "
from PIL import Image
img = Image.open('logo.png')
for size, path in [
  (128, 'pkg/usr/share/icons/hicolor/128x128/apps/result-analyzer.png'),
  (64,  'pkg/usr/share/icons/hicolor/64x64/apps/result-analyzer.png'),
  (48,  'pkg/usr/share/icons/hicolor/48x48/apps/result-analyzer.png'),
]:
    img.resize((size, size), Image.LANCZOS).save(path)
print('Icons created!')
"
          fi

          # Create control file
          printf "Package: result-analyzer\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: Developer <dev@email.com>\nDescription: College Result Analyzer\n Professional result analysis software for colleges.\n" > pkg/DEBIAN/control

          # Create desktop entry with icon
          printf "[Desktop Entry]\nVersion=1.0\nName=Result Analyzer\nComment=College Result Analyzer\nExec=/usr/local/bin/ResultAnalyzer\nIcon=result-analyzer\nTerminal=false\nType=Application\nCategories=Education;Office;\nStartupWMClass=ResultAnalyzer\n" > pkg/usr/share/applications/result-analyzer.desktop

          # Post-install script to update icon cache
          printf "#!/bin/bash\nupdate-desktop-database /usr/share/applications 2>/dev/null || true\ngtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true\n" > pkg/DEBIAN/postinst
          chmod +x pkg/DEBIAN/postinst

          dpkg-deb --build pkg result-analyzer_1.0.0.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResultAnalyzer-Linux
          path: |
            dist/ResultAnalyzer
            result-analyzer_1.0.0.deb
          retention-days: 30
