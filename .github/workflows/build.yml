name: Build Linux Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk8.6 tcl8.6 libtk8.6 libtcl8.6 libx11-6 libxft2 libxext6 libglib2.0-0 libgl1-mesa-glx libfreetype6 libfontconfig1 libdbus-1-3 libxkbcommon0 libxkbcommon-x11-0 libxcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 fonts-dejavu binutils

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade setuptools wheel pkg_resources
          pip install pyinstaller
          pip install customtkinter pdfplumber pandas matplotlib requests openpyxl pillow

      - name: Run build script
        run: python3 build_linux.py

      - name: Check output
        run: |
          echo "=== dist folder ==="
          ls -lh dist/ || echo "dist folder missing!"
          echo "=== deb file ==="
          ls -lh *.deb || echo "deb file missing!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResultAnalyzer-Linux
          path: |
            dist/ResultAnalyzer
            result-analyzer_1.0.0.deb
          retention-days: 30
