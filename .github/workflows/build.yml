name: Build Linux Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk \
            libx11-6 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libglib2.0-0 \
            libc6 \
            libgl1-mesa-glx \
            libxrender1 \
            libxext6

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter pdfplumber pandas matplotlib requests openpyxl pillow

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --windowed --name ResultAnalyzer \
            --hidden-import=pdfplumber \
            --hidden-import=pdfminer \
            --hidden-import=pdfminer.high_level \
            --hidden-import=pdfminer.layout \
            --hidden-import=pdfminer.converter \
            --hidden-import=pdfminer.pdfinterp \
            --hidden-import=pdfminer.pdfdevice \
            --hidden-import=customtkinter \
            --hidden-import=openpyxl \
            --hidden-import=pandas \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.backends.backend_tkagg \
            --hidden-import=requests \
            --hidden-import=charset_normalizer \
            --hidden-import=PIL \
            --collect-all customtkinter \
            --collect-all pdfplumber \
            --collect-all pdfminer \
            app.py

      - name: Resize icons
        shell: bash
        run: |
          python3 << 'EOF'
          from PIL import Image
          import os

          if not os.path.exists("logo.png"):
              print("logo.png not found, skipping icon resize")
          else:
              img = Image.open("logo.png")
              sizes = [256,128,64,48]
              for size in sizes:
                  folder = f"icons/{size}x{size}"
                  os.makedirs(folder, exist_ok=True)
                  img.resize((size,size), Image.LANCZOS).save(f"{folder}/result-analyzer.png")
              print("Icons created!")
          EOF

      - name: Create deb package
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/local/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/share/icons/hicolor/128x128/apps
          mkdir -p pkg/usr/share/icons/hicolor/64x64/apps
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps

          cp dist/ResultAnalyzer pkg/usr/local/bin/ResultAnalyzer
          chmod +x pkg/usr/local/bin/ResultAnalyzer

          if [ -f logo.png ]; then
            cp logo.png pkg/usr/share/pixmaps/result-analyzer.png
            cp icons/256x256/result-analyzer.png pkg/usr/share/icons/hicolor/256x256/apps/result-analyzer.png
            cp icons/128x128/result-analyzer.png pkg/usr/share/icons/hicolor/128x128/apps/result-analyzer.png
            cp icons/64x64/result-analyzer.png pkg/usr/share/icons/hicolor/64x64/apps/result-analyzer.png
            cp icons/48x48/result-analyzer.png pkg/usr/share/icons/hicolor/48x48/apps/result-analyzer.png
          fi

          echo "Package: result-analyzer" > pkg/DEBIAN/control
          echo "Version: 1.0.0" >> pkg/DEBIAN/control
          echo "Architecture: amd64" >> pkg/DEBIAN/control
          echo "Maintainer: Developer <dev@email.com>" >> pkg/DEBIAN/control
          echo "Description: College Result Analyzer Professional result analysis software" >> pkg/DEBIAN/control

          dpkg-deb --build pkg result-analyzer_1.0.0.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResultAnalyzer-Linux
          path: |
            dist/ResultAnalyzer
            result-analyzer_1.0.0.deb