name: Build Linux Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install --upgrade pip setuptools wheel pillow

      - name: Run build script
        run: python3 build_linux.py

      - name: Show output
        run: ls -lh *.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResultAnalyzer-Linux
          path: result-analyzer_1.0.0.deb
          retention-days: 30
