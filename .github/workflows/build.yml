name: Build Linux Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            tk-dev \
            tcl-dev \
            libx11-dev \
            libxft-dev \
            libxext-dev \
            libglib2.0-0 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libglu1-mesa \
            libfreetype6 \
            libfontconfig1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install pdfplumber
          pip install pandas
          pip install matplotlib
          pip install requests
          pip install openpyxl
          pip install pillow

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name ResultAnalyzer \
            --hidden-import=pdfplumber \
            --hidden-import=pdfminer \
            --hidden-import=pdfminer.high_level \
            --hidden-import=pdfminer.layout \
            --hidden-import=pdfminer.converter \
            --hidden-import=pdfminer.pdfinterp \
            --hidden-import=pdfminer.pdfdevice \
            --hidden-import=customtkinter \
            --hidden-import=openpyxl \
            --hidden-import=openpyxl.styles \
            --hidden-import=pandas \
            --hidden-import=pandas.io.formats.excel \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.backends.backend_tkagg \
            --hidden-import=requests \
            --hidden-import=charset_normalizer \
            --hidden-import=PIL \
            --hidden-import=tkinter \
            --hidden-import=_tkinter \
            --collect-all customtkinter \
            --collect-all pdfplumber \
            --collect-all pdfminer \
            app.py

      - name: Resize icons
        run: |
          python3 - << 'PYEOF'
          import os
          from PIL import Image

          if not os.path.exists("logo.png"):
              print("logo.png not found, skipping")
          else:
              img = Image.open("logo.png")
              for size in [256, 128, 64, 48, 32]:
                  folder = f"icons/{size}x{size}"
                  os.makedirs(folder, exist_ok=True)
                  img.resize((size, size), Image.LANCZOS).save(f"{folder}/result-analyzer.png")
              print("Icons created!")
          PYEOF

      - name: Create .deb package
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/local/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/share/icons/hicolor/128x128/apps
          mkdir -p pkg/usr/share/icons/hicolor/64x64/apps
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps
          mkdir -p pkg/usr/share/icons/hicolor/32x32/apps

          cp dist/ResultAnalyzer pkg/usr/local/bin/result-analyzer-bin
          chmod +x pkg/usr/local/bin/result-analyzer-bin

          cat > pkg/usr/local/bin/ResultAnalyzer << 'WRAPPER'
          #!/bin/bash
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8
          export DISPLAY=${DISPLAY:-:0}
          export GDK_BACKEND=x11
          export LIBGL_ALWAYS_SOFTWARE=1
          if [ -d /usr/share/tcltk/tcl8.6 ]; then
            export TCL_LIBRARY=/usr/share/tcltk/tcl8.6
          fi
          if [ -d /usr/share/tcltk/tk8.6 ]; then
            export TK_LIBRARY=/usr/share/tcltk/tk8.6
          fi
          exec /usr/local/bin/result-analyzer-bin "$@"
          WRAPPER
          chmod +x pkg/usr/local/bin/ResultAnalyzer

          if [ -f "logo.png" ]; then
            cp logo.png pkg/usr/share/pixmaps/result-analyzer.png
          fi

          for size in 256x256 128x128 64x64 48x48 32x32; do
            if [ -f "icons/${size}/result-analyzer.png" ]; then
              cp "icons/${size}/result-analyzer.png" "pkg/usr/share/icons/hicolor/${size}/apps/result-analyzer.png"
            fi
          done

          cat > pkg/usr/share/applications/result-analyzer.desktop << 'DESKTOP'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=College Result Analyzer
          Comment=Professional result analysis software
          Exec=ResultAnalyzer
          Icon=result-analyzer
          Terminal=false
          Categories=Education;Office;
          StartupNotify=true
          DESKTOP

          echo "Package: result-analyzer" > pkg/DEBIAN/control
          echo "Version: 1.0.0" >> pkg/DEBIAN/control
          echo "Architecture: amd64" >> pkg/DEBIAN/control
          echo "Maintainer: Developer <dev@email.com>" >> pkg/DEBIAN/control
          echo "Depends: libx11-6, libglib2.0-0, libgl1-mesa-glx, python3-tk, libfreetype6, libfontconfig1" >> pkg/DEBIAN/control
          echo "Description: College Result Analyzer" >> pkg/DEBIAN/control
          echo " Professional result analysis software for colleges." >> pkg/DEBIAN/control

          echo "#!/bin/bash" > pkg/DEBIAN/postinst
          echo "set -e" >> pkg/DEBIAN/postinst
          echo "update-desktop-database /usr/share/applications 2>/dev/null || true" >> pkg/DEBIAN/postinst
          echo "gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true" >> pkg/DEBIAN/postinst
          echo "exit 0" >> pkg/DEBIAN/postinst
          chmod +x pkg/DEBIAN/postinst

          dpkg-deb --build pkg result-analyzer_1.0.0.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResultAnalyzer-Linux
          path: |
            dist/ResultAnalyzer
            result-analyzer_1.0.0.deb
          retention-days: 30
                    mkdir -p pkg/usr/local/bin
                    mkdir -p pkg/usr/share/applications
                    mkdir -p pkg/usr/share/pixmaps
                    mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
                    mkdir -p pkg/usr/share/icons/hicolor/128x128/apps
                    mkdir -p pkg/usr/share/icons/hicolor/64x64/apps
                    mkdir -p pkg/usr/share/icons/hicolor/48x48/apps
                    mkdir -p pkg/usr/share/icons/hicolor/32x32/apps

                    cp dist/ResultAnalyzer pkg/usr/local/bin/result-analyzer-bin
                    chmod +x pkg/usr/local/bin/result-analyzer-bin

                    cat > pkg/usr/local/bin/ResultAnalyzer << 'WRAPPER'
          #!/bin/bash
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8
          export DISPLAY=${DISPLAY:-:0}
          export GDK_BACKEND=x11
          export LIBGL_ALWAYS_SOFTWARE=1
          if [ -d /usr/share/tcltk/tcl8.6 ]; then
            export TCL_LIBRARY=/usr/share/tcltk/tcl8.6
          fi
          if [ -d /usr/share/tcltk/tk8.6 ]; then
            export TK_LIBRARY=/usr/share/tcltk/tk8.6
          fi
          exec /usr/local/bin/result-analyzer-bin "$@"
          WRAPPER
                    chmod +x pkg/usr/local/bin/ResultAnalyzer

                    if [ -f "logo.png" ]; then
                      cp logo.png pkg/usr/share/pixmaps/result-analyzer.png
                    fi

                    for size in 256x256 128x128 64x64 48x48 32x32; do
                      if [ -f "icons/${size}/result-analyzer.png" ]; then
                        cp "icons/${size}/result-analyzer.png" "pkg/usr/share/icons/hicolor/${size}/apps/result-analyzer.png"
                      fi
                    done

                    echo "[Desktop Entry]" > pkg/usr/share/applications/result-analyzer.desktop
                    echo "Version=1.0" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Type=Application" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Name=College Result Analyzer" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Comment=Professional result analysis software" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Exec=ResultAnalyzer" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Icon=result-analyzer" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Terminal=false" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "Categories=Education;Office;" >> pkg/usr/share/applications/result-analyzer.desktop
                    echo "StartupNotify=true" >> pkg/usr/share/applications/result-analyzer.desktop

                    echo "Package: result-analyzer" > pkg/DEBIAN/control
                    echo "Version: 1.0.0" >> pkg/DEBIAN/control
                    echo "Architecture: amd64" >> pkg/DEBIAN/control
                    echo "Maintainer: Developer <dev@email.com>" >> pkg/DEBIAN/control
                    echo "Depends: libx11-6, libglib2.0-0, libgl1-mesa-glx, python3-tk, libfreetype6, libfontconfig1" >> pkg/DEBIAN/control
                    echo "Description: College Result Analyzer" >> pkg/DEBIAN/control
                    echo " Professional result analysis software for colleges." >> pkg/DEBIAN/control

                    echo "#!/bin/bash" > pkg/DEBIAN/postinst
                    echo "set -e" >> pkg/DEBIAN/postinst
                    echo "update-desktop-database /usr/share/applications 2>/dev/null || true" >> pkg/DEBIAN/postinst
                    echo "gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true" >> pkg/DEBIAN/postinst
                    echo "exit 0" >> pkg/DEBIAN/postinst
                    chmod +x pkg/DEBIAN/postinst

                    dpkg-deb --build pkg result-analyzer_1.0.0.deb

                - name: Upload artifacts
                  uses: actions/upload-artifact@v4
                  with:
                    name: ResultAnalyzer-Linux
                    path: |
                      dist/ResultAnalyzer
                      result-analyzer_1.0.0.deb
                    retention-days: 30
